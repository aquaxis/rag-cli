services:
  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: rag-qdrant
    restart: unless-stopped
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__LOG_LEVEL: INFO

  ollama:
    image: ollama/ollama:0.5.4
    container_name: rag-ollama
    restart: unless-stopped
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # GPU が無ければ deploy セクションを削除
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  docling:
    image: quay.io/docling-project/docling-serve-cpu:latest
    # GPU 版: quay.io/docling-project/docling-serve-cu128:latest
    container_name: rag-docling
    restart: unless-stopped
    ports:
      - "127.0.0.1:5001:5001"
    environment:
      DOCLING_SERVE_ENABLE_UI: "1"
      DOCLING_SERVE_API_HOST: "0.0.0.0"
      DOCLING_SERVE_API_PORT: "5001"
    volumes:
      - docling_cache:/opt/app-root/src/.cache

volumes:
  qdrant_data:
  ollama_data:
  docling_cache:
